<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>장기렌트 3초 테스트</title>

<style>

body{
font-family:Arial;
background:#f2f4f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
width:420px;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

h2{
margin-bottom:10px;
}

.step{
color:#888;
font-size:14px;
margin-bottom:20px;
}

button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
background:#2c7be5;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#1a5fd1;
}

.result{
font-size:18px;
margin-bottom:20px;
}

.car{
background:#f7f7f7;
padding:12px;
border-radius:10px;
margin:6px 0;
}

.car span{
font-size:14px;
color:#666;
}

.kakao{
margin-top:15px;
background:#f7e600;
color:#000;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2 id="question">장기렌트 가능 여부 테스트</h2>
<div class="step" id="step">1 / 3 단계</div>

<div id="answers"></div>

</div>

<script>

let step = 0

const questions = [

{
q:"현재 신용 상태가 어떻게 되시나요?",
a:["정상 신용","연체 이력 있음","개인회생 진행 중","신용불량"]
},

{
q:"현재 소득 활동을 하고 계신가요?",
a:["직장 재직 중","개인사업 / 프리랜서","일용직","현재 무직"]
},

{
q:"보증금 준비 가능 금액은 어느 정도인가요?",
a:["200만원 이상","100만원 정도","50만원 정도","어려움"]
}

]

function showQuestion(){

const q = questions[step]

document.getElementById("question").innerText = q.q
document.getElementById("step").innerText = (step+1) + " / 3 단계"

let html=""

q.a.forEach(answer=>{
html += `<button onclick="nextStep()">${answer}</button>`
})

document.getElementById("answers").innerHTML = html

}

function nextStep(){

step++

if(step < questions.length){

showQuestion()

}else{

showResult()

}

}

function showResult(){

document.getElementById("question").innerText="테스트 결과"
document.getElementById("step").innerText="확인 완료"

document.getElementById("answers").innerHTML=

`
<div class="result">
현재 조건으로 장기렌트 진행 가능성이 있습니다.
</div>

<h3>추천 차량</h3>

<div class="car">
티볼리<br>
<span>월 렌탈료 40만원대</span>
</div>

<div class="car">
아반떼<br>
<span>월 렌탈료 50만원대</span>
</div>

<div class="car">
스포티지<br>
<span>월 렌탈료 50만원대</span>
</div>

<button class="kakao"
onclick="location.href='https://open.kakao.com/o/sIXvlcmi'">
카톡 상담하기
</button>

`

}

showQuestion()

</script>

</body>
</html>
